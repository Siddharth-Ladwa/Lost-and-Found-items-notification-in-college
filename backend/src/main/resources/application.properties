# ── Server ────────────────────────────────────────────────────
server.port=8080

# ── MySQL (XAMPP) ─────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/lost_found_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── Connection Pool ───────────────────────────────────────────
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=10

# ── JPA / Hibernate ───────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ── Jackson ───────────────────────────────────────────────────
spring.jackson.serialization.fail-on-empty-beans=false
spring.jackson.default-property-inclusion=non_null

# ── File Upload ───────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads/

# ── JWT ───────────────────────────────────────────────────────
app.jwt.secret=LostFoundSecretKey2024SuperLongSecretKeyForJWT
app.jwt.expiration=86400000

# ── App ───────────────────────────────────────────────────────
app.name=Lost & Found System
logging.level.com.lostandfound=INFO
logging.level.org.springframework.security=DEBUG
